<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mises à jour, annonces importantes, événements et changements du serveur seront publiés ici.">
  <meta name="theme-color" content="#07090d">
  <title>Actualités — Grand Montréal RP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="assets/css/multipage.css">
</head>
<body class="multi-page">
  <div class="grain" aria-hidden="true"></div>
  <div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>
  <div data-site-header></div>

  <main>
    <section class="page-hero">
      <div class="page-hero-content reveal">
        <p class="eyebrow">COMMUNICATION</p>
        <h1>LES DERNIÈRES NOUVELLES DU GRAND MONTRÉAL</h1>
        <p class="page-hero-lead">Mises à jour, annonces importantes, événements et changements du serveur seront publiés ici.</p>

        <div class="live-showcase" data-live-root>
          <div class="live-showcase-main">
            <span class="header-live-dot" data-live-dot></span>
            <div>
              <strong data-live-state>Vérification du serveur</strong>
              <small data-live-name>Grand Montréal RP</small>
            </div>
          </div>
          <div class="live-showcase-stat">
            <strong data-live-players>—</strong>
            <small>Joueurs</small>
          </div>
          <div class="live-showcase-stat">
            <strong data-live-capacity>—</strong>
            <small>Capacité</small>
          </div>
        </div>
      </div>
    </section>

    <section class="page-content">
      <section class="news-placeholder">
          Le module dynamique sera branché ici dans la prochaine partie de la Milestone 3.
        </section>
    </section>
  </main>

  <div data-site-footer></div>
  <script src="assets/js/site-shell.js"></script>
  <script src="assets/js/live-status.js"></script>
  <script src="script.js"></script>
</body>
</html>
