<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Connexion staff — Grand Montréal RP</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07090d;
      --panel: #10151d;
      --line: rgba(255,255,255,.1);
      --red: #ff3042;
      --text: #f5f7fa;
      --muted: #9ca5b1;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at 80% 20%, rgba(209,31,47,.16), transparent 28%),
        var(--bg);
      font-family: Arial, sans-serif;
    }

    .card {
      width: min(520px, 100%);
      padding: 32px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(0,0,0,.45);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.25rem;
      text-transform: uppercase;
    }

    .intro {
      margin: 0 0 26px;
      color: var(--muted);
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 17px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 700;
      text-transform: uppercase;
      font-size: .8rem;
      letter-spacing: .06em;
    }

    input {
      min-height: 50px;
      width: 100%;
      padding: 0 14px;
      color: white;
      background: rgba(255,255,255,.025);
      border: 1px solid var(--line);
      border-radius: 3px;
      outline: none;
      font: inherit;
    }

    input:focus {
      border-color: rgba(255,48,66,.7);
      box-shadow: 0 0 0 3px rgba(209,31,47,.1);
    }

    button {
      min-height: 52px;
      border: 0;
      border-radius: 3px;
      color: white;
      background: linear-gradient(135deg, #ff3042, #d11f2f);
      cursor: pointer;
      font-weight: 800;
      text-transform: uppercase;
    }

    button:disabled {
      opacity: .55;
      cursor: wait;
    }

    #message {
      min-height: 22px;
      margin-top: 18px;
      color: #efb4bb;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Connexion staff</h1>
    <p class="intro">
      Utilise ton identifiant personnel pour accéder au BackOffice.
    </p>

    <form id="loginForm">
      <label>
        Identifiant
        <input name="username" autocomplete="username" required>
      </label>

      <label>
        Mot de passe
        <input name="password" type="password" autocomplete="current-password" required>
      </label>

      <button type="submit">Se connecter</button>
    </form>

    <div id="message"></div>
  </main>

  <script>
    const form = document.querySelector("#loginForm");
    const message = document.querySelector("#message");

    async function request(path, options = {}) {
      const response = await fetch(path, {
        credentials: "same-origin",
        headers: {
          "Content-Type": "application/json"
        },
        ...options
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data.error || "Une erreur est survenue.");
      }

      return data;
    }

    async function checkSession() {
      const status = await request("/api/auth/session");

      if (status.authenticated) {
        window.location.replace("admin.html");
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const button = form.querySelector("button");
      button.disabled = true;
      message.textContent = "";

      try {
        await request("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({
            username: form.username.value.trim(),
            password: form.password.value
          })
        });

        window.location.replace("admin.html");
      } catch (error) {
        message.textContent = error.message;
        button.disabled = false;
      }
    });

    checkSession().catch((error) => {
      console.error(error);
    });
  </script>
</body>
</html>
